$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json

name: blue
endpoint_name: iris-endpoint-joshua

model:
  path: ../models
  type: mlflow_model

# Health Probes an den tatsächlichen Server-Port 31311 anpassen
liveness_probe:
  path: /
  port: 31311
  initial_delay: 300       # Wartezeit vor erster Prüfung (Sekunden)
  period: 10
  timeout: 5
  failure_threshold: 60

readiness_probe:
  path: /
  port: 31311
  initial_delay: 300
  period: 10
  timeout: 5
  failure_threshold: 60

request_settings:
  request_timeout_ms: 15000
  max_concurrent_requests_per_instance: 1

instance_type: Standard_E2s_v3
instance_count: 1
``
