$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json

name: blue
endpoint_name: iris-endpoint-joshua

# Wichtig: zeigt auf den Ordner, in dem DIREKT die "MLmodel" liegt
model:
  path: ./models
  type: mlflow_model

# Für MLflow-Modelle ist keine custom code_configuration nötig;
# der MLflow-Server und die Umgebung werden aus dem MLmodel geladen.

instance_type: Standard_E2s_v3
instance_count: 1

# In v2 sind bei Probes nur Timing-Parameter erlaubt
liveness_probe:
  initial_delay: 120
  period: 10
  timeout: 5
  failure_threshold: 60

readiness_probe:
  initial_delay: 120
  period: 10
  timeout: 5
  failure_threshold: 60

request_settings:
  request_timeout_ms: 15000
  max_concurrent_requests_per_instance: 1
