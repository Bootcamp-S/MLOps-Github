$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json

name: blue
endpoint_name: iris-endpoint-joshua

model:
  path: ../models
  type: mlflow_model

# Nur Timing-Felder – KEIN path/port, die sind im v2-Schema nicht erlaubt
liveness_probe:
  initial_delay: 300
  period: 10
  timeout: 5
  failure_threshold: 60

readiness_probe:
  initial_delay: 300
  period: 10
  timeout: 5
  failure_threshold: 60

request_settings:
  request_timeout_ms: 15000
  max_concurrent_requests_per_instance: 1

instance_type: Standard_E2s_v3
instance_count: 1
