name: CD-ML-Deploy

on:
  # CD startet automatisch nach erfolgreichem CI
  workflow_run:
    workflows: ["CI-ML-Pipeline"]   # <- exakt wie in deiner CI (name:)
    types: [completed]

  # Optional: manuell startbar
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: cd-ml-deploy
  cancel-in-progress: true

jobs:
  deploy-model:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI
        run: az extension add -n ml -y

      # Holt das MLflow-Artefakt (aus CI)
      - name: Download MLflow model artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-ml.yml           # <- Dateiname deiner CI-Workflow-Datei
          name: mlflow-model
          path: models
          branch: main
          workflow_conclusion: success

      # Endpoint absichern (idempotent)
      - name: Create endpoint (idempotent)
        run: |
          az ml online-endpoint create \
            --name iris-endpoint-joshua \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" || true
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # Debug: welche Deployments existieren aktuell?
      - name: List current deployments (debug)
        run: |
          az ml online-deployment list \
            --endpoint-name iris-endpoint-joshua \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" -o table
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # Altes green/blue vorab löschen (idempotent, non-interactive)
      - name: Delete deployment green if exists (idempotent)
        run: |
          az ml online-deployment delete \
            --name green \
            --endpoint-name iris-endpoint-joshua \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" \
            --yes || true
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      - name: Delete deployment blue if exists (idempotent)
        run: |
          az ml online-deployment delete \
            --name blue \
            --endpoint-name iris-endpoint-joshua \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" \
            --yes || true
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # Debug: zeig die Deployment-YAML
      - name: Show deployment YAML (blue)
        run: |
          echo "----- aml-deploy/blue-deployment.yml -----"
          nl -ba aml-deploy/blue-deployment.yml

      # Debug: zeig die MLflow-Umgebung aus dem Artefakt (conda.yaml)
      - name: Show MLflow conda.yaml (from model artifact)
        run: |
          echo "----- models/conda.yaml -----"
          nl -ba models/conda.yaml || true

      # Neues Deployment 'green' anlegen (aus der blue-Vorlage)
      - name: Create new deployment (green)
        run: |
          cp aml-deploy/blue-deployment.yml aml-deploy/green-deployment.yml
          # Stelle sicher, dass der Name auf 'green' geändert wird:
          sed -i "s/^name: blue$/name: green/" aml-deploy/green-deployment.yml

          az ml online-deployment create \
            --file aml-deploy/green-deployment.yml \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG"
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # Falls das Create scheitert: Container-Logs & Status dumpen (wichtige Diagnose)
      - name: Get deployment logs (last 400 lines)
        if: failure()
        run: |
          az ml online-deployment get-logs \
            --name green \
            --endpoint iris-endpoint-joshua \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" \
            --lines 400 || true
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      - name: Show deployment state (debug)
        if: failure()
        run: |
          az ml online-deployment show \
            --name green \
            --endpoint iris-endpoint-joshua \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" -o json
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # Traffic auf green (100 %)
      - name: Route traffic to green
        run: |
          az ml online-endpoint update \
            --name iris-endpoint-joshua \
            --traffic green=100 \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG"
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}
