name: CD-ML-Deploy

on:
  # CD startet automatisch, sobald der CI-Workflow abgeschlossen ist
  workflow_run:
    workflows: ["CI-ML-Pipeline"]   # <- muss exakt deinem CI 'name:' entsprechen
    types: [completed]

  # Optional: manueller Start möglich
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: cd-ml-deploy
  cancel-in-progress: true

jobs:
  deploy-model:
    # nur ausführen, wenn der CI-Run erfolgreich war
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Install Azure ML CLI
      run: az extension add -n ml -y

    # Holt das MLflow-Model aus dem neuesten erfolgreichen CI-Run (Artefakt)
    - name: Download MLflow model artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: ci-ml.yml           # <- Dateiname deiner CI-Workflow-Datei
        name: mlflow-model
        path: models
        branch: main
        workflow_conclusion: success

    # Registriert das MLflow-Modell aus ./models in Azure ML
    - name: Register model
      run: |
        az ml model create \
          --name iris-model \
          --type mlflow_model \
          --path models \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG"
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    # Endpoint vorab (idempotent) erzeugen/absichern
    - name: Create endpoint (idempotent)
      run: |
        az ml online-endpoint create \
          --name iris-endpoint-joshua \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG" || true
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    # YAML vor der Versions-Ersetzung anzeigen (Debug)
    - name: Show deployment YAML (before sed)
      run: |
        echo "----- blue-deployment.yml (before) -----"
        nl -ba aml-deploy/blue-deployment.yml

    # Neueste Modellversion robust (numerisch) ermitteln
    - name: Resolve latest model version (numeric)
      id: model
      run: |
        VER=$(az ml model list \
          --name iris-model \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG" \
          --query "max_by([].{v: to_number(version)}, &v).v" -o tsv)
        echo "Resolved model version = $VER"
        echo "version=$VER" >> $GITHUB_OUTPUT
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    # Deployment ERST erstellen (ohne Traffic) – Workaround für CLI-Fehler
    - name: Create deployment (blue, no traffic yet)
      run: |
        sed -i "s/version: 1/version: ${{ steps.model.outputs.version }}/" aml-deploy/blue-deployment.yml

        echo "----- blue-deployment.yml (after sed) -----"
        nl -ba aml-deploy/blue-deployment.yml

        az ml online-deployment create \
          --file aml-deploy/blue-deployment.yml \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG"
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    # Traffic separat setzen (um den bekannten as_posix-Fehler zu vermeiden)
    - name: Set traffic to blue (100%)
      run: |
        az ml online-endpoint update \
          --name iris-endpoint-joshua \
          --traffic blue=100 \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG"
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}
