name: CD-ML-Deploy

on:
  # CD startet automatisch nach erfolgreichem CI
  workflow_run:
    workflows: ["CI-ML-Pipeline"]   # <- muss exakt deinem CI-Workflow-Namen entsprechen
    types: [completed]

  # Optional: manuell startbar
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: cd-ml-deploy
  cancel-in-progress: true

jobs:
  deploy-model:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI
        run: az extension add -n ml -y

      # Holt das MLflow-Artefakt (CI → CD)
      - name: Download MLflow model artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-ml.yml           # <- Dateiname deiner CI-Workflow-Datei
          name: mlflow-model
          path: models
          branch: main
          workflow_conclusion: success

      # Endpoint einmalig anlegen/absichern (idempotent)
      - name: Create endpoint (idempotent)
        run: |
          az ml online-endpoint create \
            --name iris-endpoint-joshua \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" || true
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # MLflow-Environment als Azure-Asset (stabiler als Inline-Image)
      - name: Ensure MLflow environment asset (idempotent)
        run: |
          az ml environment create \
            --name mlflow-serve \
            --version 1 \
            --image mcr.microsoft.com/azureml/mlflow:2.12-py310-cpu \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" || true
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # YAML anzeigen (Debug)
      - name: Show deployment YAML (as used)
        run: |
          echo "----- aml-deploy/blue-deployment.yml -----"
          nl -ba aml-deploy/blue-deployment.yml

      # 1) Deployment erstellen (OHNE Traffic) – robust gegen CLI-Race-Conditions
      - name: Create deployment (blue, no traffic yet)
        run: |
          az ml online-deployment create \
            --file aml-deploy/blue-deployment.yml \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG"
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # Optional: Logs ziehen, falls Create-Deployment scheitert (Diagnose)
      - name: Get deployment logs (last 200 lines)
        if: failure()
        run: |
          az ml online-deployment get-logs \
            --name blue \
            --endpoint iris-endpoint-joshua \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" \
            --lines 200 || true
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # 2) Traffic separat setzen (Workaround für as_posix-Fehler)
      - name: Set traffic to blue (100%)
        run: |
          az ml online-endpoint update \
            --name iris-endpoint-joshua \
            --traffic blue=100 \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG"
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}
