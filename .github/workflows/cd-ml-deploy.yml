name: CD-ML-Deploy

on:
  workflow_run:
    workflows: ["CI-ML-Pipeline"]   # <- exakt wie in deiner ci-ml.yml
    types: [completed]

  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: cd-ml-deploy
  cancel-in-progress: true

jobs:
  deploy-model:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Show triggering workflow_run info
      run: |
        echo "Triggered by workflow: ${{ github.event.workflow_run.name }}"
        echo "Conclusion:           ${{ github.event.workflow_run.conclusion }}"
        echo "Event:                ${{ github.event.workflow_run.event }}"
        echo "CI run-id:            ${{ github.event.workflow_run.id }}"

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Install Azure ML CLI
      run: az extension add -n ml -y

    # 🔥 Der wichtige Fix:
    # Holt das Artefakt aus dem NEUESTEN erfolgreichen CI-Run.
    - name: Download MLflow model artifact (robust)
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: ci-ml.yml        # <- CI-Workflow-Name
        name: mlflow-model              # <- exakt wie im CI-Upload
        path: models                    # <- wird hier extrahiert
        branch: main                    # <- dein CI läuft auf main
        workflow_conclusion: success    # <- nur erfolgreiche CI-Runs

    # Debug: leakt keine Werte
    - name: Debug inputs (sanitized)
      run: |
        echo "Workspace: ${AML_WORKSPACE:+SET}"
        echo "Resource Group: ${AML_RG:+SET}"
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    - name: Register model
      run: |
        az ml model create \
          --name iris-model \
          --type mlflow_model \
          --path ./models \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG"
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    - name: Create endpoint (idempotent)
      run: |
        az ml online-endpoint create \
          --name iris-endpoint \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG" || true
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    # Finde die neueste Modellversion aus der Registry
    - name: Resolve latest model version
      id: model
      run: |
        VER=$(az ml model list \
          --name iris-model \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG" \
          --query "[].version | max(@)" -o tsv)
        echo "version=$VER" >> $GITHUB_OUTPUT
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    - name: Deploy as endpoint (blue)
      run: |
        sed -i "s/version: 1/version: ${{ steps.model.outputs.version }}/" aml-deploy/blue-deployment.yml

        az ml online-deployment create \
          --file aml-deploy/blue-deployment.yml \
          --resource-group "$AML_RG" \
          --workspace-name "$AML_WORKSPACE" \
          --all-traffic
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}
