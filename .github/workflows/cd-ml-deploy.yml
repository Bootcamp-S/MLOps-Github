name: CD-ML-Deploy

on:
  workflow_run:
    workflows: ["CI-ML-Pipeline"]
    types: [completed]

  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: cd-ml-deploy
  cancel-in-progress: true

jobs:
  deploy-model:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Install Azure ML CLI
      run: az extension add -n ml -y

    - name: Download MLflow model artifact
      uses: dawidd6/action-download-artifact@v6
      with:
        workflow: ci-ml.yml
        name: mlflow-model
        path: models
        branch: main
        workflow_conclusion: success

    - name: Register model
      run: |
        az ml model create \
          --name iris-model \
          --type mlflow_model \
          --path models \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG"
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    - name: Create endpoint (idempotent)
      run: |
        az ml online-endpoint create \
          --name iris-endpoint-joshua \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG" || true
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    - name: Resolve latest model version
      id: model
      run: |
        VER=$(az ml model list \
          --name iris-model \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG" \
          --query "[].version | max(@)" -o tsv)
        echo "version=$VER" >> $GITHUB_OUTPUT
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    - name: Deploy as endpoint (blue)
      run: |
        sed -i "s/version: 1/version: ${{ steps.model.outputs.version }}/" aml-deploy/blue-deployment.yml

        az ml online-deployment create \
          --file aml-deploy/blue-deployment.yml \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG" \
          --all-traffic
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}
