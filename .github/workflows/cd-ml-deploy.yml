name: CD-ML-Deploy

on:
  # Starte CD automatisch, wenn der CI-Workflow abgeschlossen ist
  workflow_run:
    workflows: ["CI-ML-Pipeline"]   # <- exakt wie in deiner ci-ml.yml
    types: [completed]

  # Optional: zusätzlich manuell startbar (z. B. für Re-Deploys)
  workflow_dispatch:

# Ermöglicht Zugriff auf Artefakte anderer Runs + verhindert parallele Deploys
permissions:
  actions: read
  contents: read

concurrency:
  group: cd-ml-deploy
  cancel-in-progress: true

jobs:
  deploy-model:
    # Nur ausführen, wenn der CI-Run erfolgreich war und durch 'push' ausgelöst wurde
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Show triggering workflow_run info
      run: |
        echo "Triggered by workflow: ${{ github.event.workflow_run.name }}"
        echo "Conclusion:           ${{ github.event.workflow_run.conclusion }}"
        echo "Event:                ${{ github.event.workflow_run.event }}"
        echo "CI run-id:            ${{ github.event.workflow_run.id }}"

    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Install Azure ML CLI
      run: az extension add -n ml -y

    # 🔽 Artefakt aus DEM CI-Run laden, der diese CD getriggert hat
    - name: Download MLflow model artifact from CI run
      uses: actions/download-artifact@v4
      with:
        name: mlflow-model          # <- muss exakt dem Upload-Namen in CI entsprechen
        path: models
        run-id: ${{ github.event.workflow_run.id }}

    # Sanity-Check für Secrets (leakt keine Inhalte)
    - name: Debug inputs (sanitized)
      run: |
        echo "Workspace: ${AML_WORKSPACE:+SET}"
        echo "Resource Group: ${AML_RG:+SET}"
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    - name: Register model
      run: |
        az ml model create \
          --name iris-model \
          --type mlflow_model \
          --path ./models \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG"
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    - name: Create endpoint (idempotent)
      run: |
        az ml online-endpoint create \
          --name iris-endpoint \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG" || true
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    # Optional: stets die neueste registrierte Modellversion deployen
    - name: Resolve latest model version
      id: model
      run: |
        VER=$(az ml model list \
          --name iris-model \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG" \
          --query "[].version | max(@)" -o tsv)
        echo "version=$VER" >> $GITHUB_OUTPUT
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}

    - name: Deploy as endpoint (blue, 100% traffic)
      run: |
        az ml online-deployment create \
          --name blue \
          --endpoint iris-endpoint \
          --model iris-model:${{ steps.model.outputs.version }} \
          --instance-type Standard_DS2_v2 \
          --workspace-name "$AML_WORKSPACE" \
          --resource-group "$AML_RG" \
          --all-traffic
      env:
        AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
        AML_RG: ${{ secrets.AML_RG }}
