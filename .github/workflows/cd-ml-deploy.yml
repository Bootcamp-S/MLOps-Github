name: CD-ML-Deploy

on:
  # Startet CD automatisch, wenn der CI-Workflow abgeschlossen ist
  workflow_run:
    workflows: ["CI-ML-Pipeline"]   # <- muss exakt dem name: deiner CI entsprechen
    types: [completed]

  # Optional: manuell startbar
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: cd-ml-deploy
  cancel-in-progress: true

jobs:
  deploy-model:
    # nur ausführen, wenn der CI-Run erfolgreich war
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI
        run: az extension add -n ml -y

      # Holt das MLflow-Artefakt aus dem neuesten erfolgreichen CI-Run
      - name: Download MLflow model artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci-ml.yml           # <- Dateiname deiner CI-Workflow-Datei
          name: mlflow-model
          path: models
          branch: main
          workflow_conclusion: success

      # Registriert das MLflow-Modell aus ./models in Azure ML
      - name: Register model
        run: |
          az ml model create \
            --name iris-model \
            --type mlflow_model \
            --path models \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG"
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # Endpoint einmalig anlegen/absichern (idempotent)
      - name: Create endpoint (idempotent)
        run: |
          az ml online-endpoint create \
            --name iris-endpoint-joshua \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" || true
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # MLflow-Environment als Azure-Asset anlegen (um fragile Inline-Image-Auflösung zu vermeiden)
      - name: Ensure MLflow environment asset (idempotent)
        run: |
          az ml environment create \
            --name mlflow-serve \
            --version 1 \
            --image mcr.microsoft.com/azureml/mlflow:2.12-py310-cpu \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" || true
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # YAML zeigen (Debug) – damit wir immer sehen, was deployed wird
      - name: Show deployment YAML (before sed)
        run: |
          echo "----- blue-deployment.yml (before) -----"
          nl -ba aml-deploy/blue-deployment.yml

      # Neueste Modellversion numerisch ermitteln (z. B. 20)
      - name: Resolve latest model version (numeric)
        id: model
        run: |
          VER=$(az ml model list \
            --name iris-model \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" \
            --query "max_by([].{v: to_number(version)}, &v).v" -o tsv)
          echo "Resolved model version = $VER"
          echo "version=$VER" >> $GITHUB_OUTPUT
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # 1) Deployment erstellen (ohne Traffic) – um CLI-Race-Condition zu vermeiden
      - name: Create deployment (blue, no traffic yet)
        run: |
          sed -i "s/version: 1/version: ${{ steps.model.outputs.version }}/" aml-deploy/blue-deployment.yml
          echo "----- blue-deployment.yml (after sed) -----"
          nl -ba aml-deploy/blue-deployment.yml

          az ml online-deployment create \
            --file aml-deploy/blue-deployment.yml \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG"
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # Optional: Logs ziehen, falls Create-Deployment scheitert (hilft beim Debugging)
      - name: Get deployment logs (last 200 lines)
        if: failure()
        run: |
          az ml online-deployment get-logs \
            --name blue \
            --endpoint iris-endpoint-joshua \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG" \
            --lines 200 || true
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}

      # 2) Traffic separat setzen (Workaround für 'NoneType.as_posix' bei kombinierten Operationen)
      - name: Set traffic to blue (100%)
        run: |
          az ml online-endpoint update \
            --name iris-endpoint-joshua \
            --traffic blue=100 \
            --workspace-name "$AML_WORKSPACE" \
            --resource-group "$AML_RG"
        env:
          AML_WORKSPACE: ${{ secrets.AML_WORKSPACE }}
          AML_RG: ${{ secrets.AML_RG }}
